root = "."
tmp_dir = "tmp"

[build]
  bin = "bin/notification-service"
  cmd = "go build -o bin/notification-service ./cmd/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "test"]
  include_ext = ["go", "tpl", "toml", "html"]
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
