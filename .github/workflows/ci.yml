name: "Project Zenith CI/CD Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  GO_VERSION: "1.21"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ─────────────────────────────────────────────
  # Lint & Type Check (all services)
  # ─────────────────────────────────────────────
  lint-and-typecheck:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint all packages (Turborepo)
        run: npx turbo run lint type-check --cache-dir=.turbo

      - name: Check formatting
        run: npm run format:check

  # ─────────────────────────────────────────────
  # Test: Node.js services
  # ─────────────────────────────────────────────
  test-node:
    name: "Test Node.js Services"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zenith_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zenith_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zenith_test:test_password@localhost:5432/zenith_test_db
      DATABASE_REPLICA_URL: postgresql://zenith_test:test_password@localhost:5432/zenith_test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_key_at_least_32_chars_long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate --workspace=@zenith/satellite-service

      - name: Run Node.js tests
        run: npx turbo run test:ci --filter=@zenith/satellite-service --cache-dir=.turbo

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          flags: satellite-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Test: Python service
  # ─────────────────────────────────────────────
  test-python:
    name: "Test Python Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/planetary-service
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    env:
      REDIS_URL: redis://localhost:6379
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.2"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate lock file if missing
        run: |
          if [ ! -f poetry.lock ]; then
            poetry lock --no-update
          fi

      - name: Load cached venv
        id: cached-poetry-deps
        uses: actions/cache@v4
        with:
          path: apps/planetary-service/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('apps/planetary-service/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-deps.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Run linting (ruff)
        run: poetry run ruff check .

      - name: Run type checking (mypy)
        run: poetry run mypy src

      - name: Run tests
        run: poetry run pytest --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          flags: planetary-service
          files: apps/planetary-service/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Test: Go service
  # ─────────────────────────────────────────────
  test-go:
    name: "Test Go Service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: apps/notification-service/go.mod

      - name: Download and tidy Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run Go tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/notification-service
          skip-cache: true

  # ─────────────────────────────────────────────
  # Security: Dependency scanning
  # ─────────────────────────────────────────────
  security-scan:
    name: "Security Scanning"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ─────────────────────────────────────────────
  # Build & Push Docker Images (main branch only)
  # ─────────────────────────────────────────────
  build-and-push:
    name: "Build & Push Docker Images"
    needs: [lint-and-typecheck, test-node, test-python, test-go, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: web
            context: "."
            dockerfile: "./infra/docker/web/Dockerfile"
          - name: satellite-service
            context: "."
            dockerfile: "./infra/docker/satellite-service/Dockerfile"
          - name: planetary-service
            context: "./apps/planetary-service"
            dockerfile: "../../infra/docker/planetary-service/Dockerfile"
          - name: notification-service
            context: "./apps/notification-service"
            dockerfile: "../../infra/docker/notification-service/Dockerfile"
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/zenith-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
